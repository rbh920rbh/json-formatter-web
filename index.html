<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON 格式化编辑器</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="stylesheet" href="./vendor/vs/editor/editor.main.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <h1>JSON 格式化编辑器</h1>

    <section class="controls">
      <button id="forceUnescapeFormatBtn">去除转义并格式化</button>
      <div class="record-switch-group" aria-label="格式化压缩切换">
        <button id="formatBtn" class="record-switch-btn" type="button">格式化</button>
        <button id="validateBtn" class="record-switch-btn" type="button">仅校验</button>
        <button id="compressBtn" class="record-switch-btn" type="button">压缩</button>
      </div>
      <div class="record-switch-group" aria-label="展开折叠切换">
        <button id="expandBtn" class="record-switch-btn" type="button">展开</button>
        <button id="collapseBtn" class="record-switch-btn" type="button">折叠</button>
      </div>
      <div class="record-switch-group" aria-label="记录切换">
        <button id="openHistoryBtn" class="record-switch-btn" type="button">历史</button>
        <button id="openFavoritesBtn" class="record-switch-btn" type="button">收藏</button>
      </div>
      <button id="clearBtn">清空</button>
      <button id="maximizeBtn">最大化</button>
    </section>

    <section class="panes">
      <div class="pane">
        <div class="pane-head">
          <h2>JSON 编辑器</h2>
          <button id="editorFavoriteBtn" class="editor-favorite-btn" type="button" aria-label="收藏当前 JSON">★ 收藏</button>
        </div>
        <div id="inputEditor" class="code-view"></div>
      </div>
    </section>
  </main>
  <aside id="historyPanel" class="history-panel" aria-label="JSON 历史记录">
    <div id="historyPanelResizeHandle" class="history-panel-resize-handle" role="separator" aria-orientation="vertical" aria-label="拖拽调整记录面板宽度"></div>
    <div class="history-panel-header">
      <h3>记录中心</h3>
      <div class="history-header-actions">
        <div class="history-mini-group" aria-label="记录导入导出">
          <button id="importRecordsBtn" class="history-mini-btn" type="button">导入</button>
          <button id="exportRecordsBtn" class="history-mini-btn" type="button">导出</button>
        </div>
        <button id="closeHistoryBtn" class="history-close-btn" aria-label="关闭历史">关闭</button>
      </div>
    </div>
    <input id="importRecordsInput" type="file" accept="application/json,.json" hidden />
    <div class="history-tabs">
      <button id="historyTabBtn" class="history-tab active" type="button">历史</button>
      <button id="favoritesTabBtn" class="history-tab" type="button">收藏</button>
    </div>
    <div class="history-search">
      <input id="recordSearchInput" class="history-search-input" type="text" placeholder="搜索名称或 JSON 内容" aria-label="搜索记录" />
      <button id="clearRecordSearchBtn" class="history-search-clear-btn" type="button" aria-label="清空搜索">×</button>
    </div>
    <div id="recordList" class="history-list"></div>
  </aside>
  <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script src="./vendor/vs/loader.js"></script>
  <script src="./app.js"></script>
</body>
</html>
